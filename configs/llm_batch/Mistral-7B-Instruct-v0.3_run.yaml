# Configuration for Mistral-7B-Instruct-v0.3 benchmark run on sample QA pairs

experiment:
  name: "mistralai/Mistral-7B-Instruct-v0.3_run"
  description: "Benchmark mistralai/Mistral-7B-Instruct-v0.3 on full QA pairs"

input:
  # Path to the QA pairs file or chunk
  qa_pairs_csv: "/workspace/data/qa/llm_batch/qa_pairs.csv"

output:
  # Base directory for results
  base_dir: "/workspace/data/results/llm_batch/Mistral-7B-Instruct-v0.3"
  
  # Specific output files
  requests_jsonl: "/workspace/data/results/llm_batch/Mistral-7B-Instruct-v0.3/requests.jsonl"
  mapping_csv: "/workspace/data/results/llm_batch/Mistral-7B-Instruct-v0.3/mapping.csv"
  output_jsonl: "/workspace/data/results/llm_batch/Mistral-7B-Instruct-v0.3/output.jsonl"
  results_csv: "/workspace/data/results/llm_batch/Mistral-7B-Instruct-v0.3/Mistral-7B-Instruct-v0.3_results.csv"
  raw_csv: "/workspace/data/results/llm_batch/Mistral-7B-Instruct-v0.3/Mistral-7B-Instruct-v0.3_raw.csv"

model:
  # Model configuration
  provider: "togetherai"  # Options: openai, groq, nebius, togetherai
  model_name: "mistralai/Mistral-7B-Instruct-v0.3"
  temperature: 0.0
  max_tokens: 200

batch:
  # Batch API settings
  completion_window: "24h"
  
# Note: API keys should be set as environment variables:
# - OPENAI_API_KEY (for provider: openai)
# - GROQ_API_KEY (for provider: groq)
# - NEBIUS_API_KEY (for provider: nebius)
