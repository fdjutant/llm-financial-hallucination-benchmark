# Configuration for GPT-4o benchmark run on sample QA pairs

experiment:
  name: "gpt-4o-mini-search-preview_run"
  description: "Benchmark gpt-4o-mini-search-preview on tiny QA pairs"

input:
  # Path to the QA pairs file or chunk
  qa_pairs_csv: "/workspace/data/qa/debug/tiny/qa_pairs.csv"

output:
  # Base directory for results
  base_dir: "/workspace/data/results/llm_batch/gpt-4o-mini-search-preview_tiny"
  
  # Specific output files
  requests_jsonl: "/workspace/data/results/llm_batch/gpt-4o-mini-search-preview_tiny/requests.jsonl"
  mapping_csv: "/workspace/data/results/llm_batch/gpt-4o-mini-search-preview_tiny/mapping.csv"
  output_jsonl: "/workspace/data/results/llm_batch/gpt-4o-mini-search-preview_tiny/output.jsonl"
  results_csv: "/workspace/data/results/llm_batch/gpt-4o-mini-search-preview_tiny_results.csv"
  raw_csv: "/workspace/data/results/llm_batch/gpt-4o-mini-search-preview_tiny_raw.csv"
model:
  # Model configuration
  provider: "openai"  # Options: openai, groq, nebius
  model_name: "gpt-4o-mini-search-preview"
  temperature: 0.0
  max_tokens: 1000

batch:
  # Batch API settings
  completion_window: "24h"
  
# Note: API keys should be set as environment variables:
# - OPENAI_API_KEY (for provider: openai)
# - GROQ_API_KEY (for provider: groq)
# - NEBIUS_API_KEY (for provider: nebius)
