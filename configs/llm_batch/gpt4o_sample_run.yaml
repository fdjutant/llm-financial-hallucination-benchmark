# Configuration for GPT-4o benchmark run on sample QA pairs

experiment:
  name: "gpt4o_sample_run"
  description: "Benchmark GPT-4o on sample QA pairs"

input:
  # Path to the QA pairs file or chunk
  qa_pairs_csv: "/workspace/data/qa/debug/tiny_sample_qa_pairs.csv"

output:
  # Base directory for results
  base_dir: "/workspace/data/results/debug/gpt-4o/sample_run"
  
  # Specific output files
  requests_jsonl: "/workspace/data/results/debug/gpt-4o/sample_run/requests.jsonl"
  mapping_csv: "/workspace/data/results/debug/gpt-4o/sample_run/mapping.csv"
  output_jsonl: "/workspace/data/results/debug/gpt-4o/sample_run/output.jsonl"
  results_csv: "/workspace/data/results/debug/gpt-4o/sample_run/results.csv"
  raw_csv: "/workspace/data/results/debug/gpt-4o/sample_run/raw.csv"

model:
  # Model configuration
  provider: "openai"  # Options: openai, groq, nebius
  model_name: "gpt-4o"
  temperature: 0.0
  max_tokens: 200

batch:
  # Batch API settings
  completion_window: "24h"
  
# Note: API keys should be set as environment variables:
# - OPENAI_API_KEY (for provider: openai)
# - GROQ_API_KEY (for provider: groq)
# - NEBIUS_API_KEY (for provider: nebius)
