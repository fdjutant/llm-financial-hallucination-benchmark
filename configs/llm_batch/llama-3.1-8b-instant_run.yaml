# Configuration for GPT-4o benchmark run on sample QA pairs

experiment:
  name: "llama-3.1-8b-instant_run"
  description: "Benchmark llama-3.1-8b-instant on full QA pairs"

input:
  # Path to the QA pairs file or chunk
  qa_pairs_csv: "/workspace/data/qa/llm_batch/qa_pairs.csv"

output:
  # Base directory for results
  base_dir: "/workspace/data/results/llm_batch/llama-3.1-8b-instant"
  
  # Specific output files
  requests_jsonl: "/workspace/data/results/llm_batch/llama-3.1-8b-instant/requests.jsonl"
  mapping_csv: "/workspace/data/results/llm_batch/llama-3.1-8b-instant/mapping.csv"
  output_jsonl: "/workspace/data/results/llm_batch/llama-3.1-8b-instant/output.jsonl"
  results_csv: "/workspace/data/results/llm_batch/llama-3.1-8b-instant_results.csv"
  raw_csv: "/workspace/data/results/llm_batch/llama-3.1-8b-instant_raw.csv"
model:
  # Model configuration
  provider: "groq"  # Options: openai, groq, nebius
  model_name: "llama-3.1-8b-instant"
  temperature: 0.0
  max_tokens: 200

batch:
  # Batch API settings
  completion_window: "24h"
  
# Note: API keys should be set as environment variables:
# - OPENAI_API_KEY (for provider: openai)
# - GROQ_API_KEY (for provider: groq)
# - NEBIUS_API_KEY (for provider: nebius)
