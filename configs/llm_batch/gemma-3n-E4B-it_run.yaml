# Configuration for gemma-3n-E4B-it benchmark run on sample QA pairs

experiment:
  name: "google/gemma-3n-E4B-it_run"
  description: "Benchmark gemma-3n-E4B-it on full QA pairs"

input:
  # Path to the QA pairs file or chunk
  qa_pairs_csv: "/workspace/data/qa/llm_batch/qa_pairs.csv"

output:
  # Base directory for results
  base_dir: "/workspace/data/results/llm_batch/gemma-3n-E4B-it"
  
  # Specific output files
  requests_jsonl: "/workspace/data/results/llm_batch/gemma-3n-E4B-it/requests.jsonl"
  mapping_csv: "/workspace/data/results/llm_batch/gemma-3n-E4B-it/mapping.csv"
  output_jsonl: "/workspace/data/results/llm_batch/gemma-3n-E4B-it/output.jsonl"
  results_csv: "/workspace/data/results/llm_batch/gemma-3n-E4B-it/gemma-3n-E4B-it_results.csv"
  raw_csv: "/workspace/data/results/llm_batch/gemma-3n-E4B-it/gemma-3n-E4B-it_raw.csv"

model:
  # Model configuration
  provider: "togetherai"  # Options: openai, groq, nebius, togetherai
  model_name: "google/gemma-3n-E4B-it"
  temperature: 0.0
  max_tokens: 200

batch:
  # Batch API settings
  completion_window: "24h"
  
# Note: API keys should be set as environment variables:
# - OPENAI_API_KEY (for provider: openai)
# - GROQ_API_KEY (for provider: groq)
# - NEBIUS_API_KEY (for provider: nebius)
