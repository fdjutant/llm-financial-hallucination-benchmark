# Configuration for llama-3.3-70b-versatile benchmark run on sample QA pairs

experiment:
  name: "llama-3.3-70b-versatile_run"
  description: "Benchmark llama-3.3-70b-versatile on full QA pairs"
input:
  # Path to the QA pairs file or chunk
  qa_pairs_csv: "/workspace/data/qa/llm_batch/qa_pairs.csv"

output:
  # Base directory for results
  base_dir: "/workspace/data/results/llm_batch/llama-3.3-70b-versatile"
  
  # Specific output files
  requests_jsonl: "/workspace/data/results/llm_batch/llama-3.3-70b-versatile/requests.jsonl"
  mapping_csv: "/workspace/data/results/llm_batch/llama-3.3-70b-versatile/mapping.csv"
  output_jsonl: "/workspace/data/results/llm_batch/llama-3.3-70b-versatile/output.jsonl"
  results_csv: "/workspace/data/results/llm_batch/llama-3.3-70b-versatile/llama-3.3-70b-versatile_results.csv"
  raw_csv: "/workspace/data/results/llm_batch/llama-3.3-70b-versatile/llama-3.3-70b-versatile_raw.csv"

model:
  # Model configuration
  provider: "groq"  # Options: openai, groq, nebius
  model_name: "llama-3.3-70b-versatile"
  temperature: 0.0
  max_tokens: 200

batch:
  # Batch API settings
  completion_window: "24h"
  
# Note: API keys should be set as environment variables:
# - OPENAI_API_KEY (for provider: openai)
# - GROQ_API_KEY (for provider: groq)
# - NEBIUS_API_KEY (for provider: nebius)
