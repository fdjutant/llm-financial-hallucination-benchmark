# Configuration for NVIDIA-Nemotron-Nano-9B-v2 benchmark run on sample QA pairs

experiment:
  name: "nvidia/NVIDIA-Nemotron-Nano-9B-v2_run"
  description: "Benchmark NVIDIA-Nemotron-Nano-9B-v2 on full QA pairs"

input:
  # Path to the QA pairs file or chunk
  qa_pairs_csv: "/workspace/data/qa/llm_batch/qa_pairs.csv"

output:
  # Base directory for results
  base_dir: "/workspace/data/results/llm_batch/NVIDIA-Nemotron-Nano-9B-v2"
  
  # Specific output files
  requests_jsonl: "/workspace/data/results/llm_batch/NVIDIA-Nemotron-Nano-9B-v2/requests.jsonl"
  mapping_csv: "/workspace/data/results/llm_batch/NVIDIA-Nemotron-Nano-9B-v2/mapping.csv"
  output_jsonl: "/workspace/data/results/llm_batch/NVIDIA-Nemotron-Nano-9B-v2/output.jsonl"
  results_csv: "/workspace/data/results/llm_batch/NVIDIA-Nemotron-Nano-9B-v2/NVIDIA-Nemotron-Nano-9B-v2_results.csv"
  raw_csv: "/workspace/data/results/llm_batch/NVIDIA-Nemotron-Nano-9B-v2/NVIDIA-Nemotron-Nano-9B-v2_raw.csv"

model:
  # Model configuration
  provider: "togetherai"  # Options: openai, groq, nebius, togetherai
  model_name: "nvidia/NVIDIA-Nemotron-Nano-9B-v2"
  temperature: 0.0
  max_tokens: 200

batch:
  # Batch API settings
  completion_window: "24h"
  
# Note: API keys should be set as environment variables:
# - OPENAI_API_KEY (for provider: openai)
# - GROQ_API_KEY (for provider: groq)
# - NEBIUS_API_KEY (for provider: nebius)
