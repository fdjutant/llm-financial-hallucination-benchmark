# Configuration for Mistral-7B-Instruct-v0.3 benchmark run on sample QA pairs

experiment:
  name: "Qwen/Qwen2.5-7B-Instruct-Turbo_run"
  description: "Benchmark Qwen/Qwen2.5-7B-Instruct-Turbo on full QA pairs"

input:
  # Path to the QA pairs file or chunk
  qa_pairs_csv: "/workspace/data/qa/llm_batch/qa_pairs.csv"

output:
  # Base directory for results
  base_dir: "/workspace/data/results/llm_batch/Qwen2.5-7B-Instruct-Turbo"
  
  # Specific output files
  requests_jsonl: "/workspace/data/results/llm_batch/Qwen2.5-7B-Instruct-Turbo/requests.jsonl"
  mapping_csv: "/workspace/data/results/llm_batch/Qwen2.5-7B-Instruct-Turbo/mapping.csv"
  output_jsonl: "/workspace/data/results/llm_batch/Qwen2.5-7B-Instruct-Turbo/output.jsonl"
  results_csv: "/workspace/data/results/llm_batch/Qwen2.5-7B-Instruct-Turbo/Qwen2.5-7B-Instruct-Turbo_results.csv"
  raw_csv: "/workspace/data/results/llm_batch/Qwen2.5-7B-Instruct-Turbo/Qwen2.5-7B-Instruct-Turbo_raw.csv"

model:
  # Model configuration
  provider: "togetherai"  # Options: openai, groq, nebius, togetherai
  model_name: "Qwen/Qwen2.5-7B-Instruct-Turbo"
  temperature: 0.0
  max_tokens: 200

batch:
  # Batch API settings
  completion_window: "24h"
  
# Note: API keys should be set as environment variables:
# - OPENAI_API_KEY (for provider: openai)
# - GROQ_API_KEY (for provider: groq)
# - NEBIUS_API_KEY (for provider: nebius)
