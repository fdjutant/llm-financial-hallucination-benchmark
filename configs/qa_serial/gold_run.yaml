# Configuration for serial QA pair generation from full canonical gold data

experiment:
  name: "gold_qa_serial_run"
  description: "Generate QA pairs from full canonical gold facts (serial, no Batch API)"

input:
  # Path to the canonical gold facts CSV
  gold_csv: "/workspace/data/processed/canonical_facts/gold.csv"

output:
  # Final QA pairs output
  qa_pairs_csv: "/workspace/data/qa/llm_batch/qa_pairs.csv"

model:
  # Model configuration (OpenAI-compatible)
  model_name: "gpt-4o-mini"
  temperature: 0.7
  max_tokens: 300

# Note: API key must be set as an environment variable or in API_KEY/OPENAI_API_KEY:
# - OPENAI_API_KEY
